<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客登记系统 - 完整演示</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Noto Sans SC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- QRCode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* ========================================
           全局样式
           ======================================== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #F9FAFB;
            color: #1F2937;
        }
        
        /* ========================================
           小程序端样式
           ======================================== */
        
        .miniprogram-container {
            width: 375px;
            height: 667px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }
        
        .miniprogram-header {
            height: 44px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #E5E7EB;
        }
        
        .miniprogram-content {
            height: calc(667px - 44px);
            overflow-y: auto;
            background: #F9FAFB;
        }
        
        /* ========================================
           企微端样式
           ======================================== */
        
        .work-container {
            width: 375px;
            height: 667px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }
        
        /* ========================================
           PC管理端样式
           ======================================== */
        
        .pc-container {
            width: 100%;
            min-height: 100vh;
            background: #F9FAFB;
        }
        
        .pc-sidebar {
            width: 192px;
            background: white;
            border-right: 1px solid #E5E7EB;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }
        
        .pc-header {
            height: 48px;
            background: white;
            border-bottom: 1px solid #E5E7EB;
            position: fixed;
            left: 192px;
            right: 0;
            top: 0;
            z-index: 99;
        }
        
        .pc-main {
            margin-left: 192px;
            margin-top: 48px;
            padding: 24px;
            min-height: calc(100vh - 48px);
        }
        
        /* ========================================
           组件样式
           ======================================== */
        
        /* 按钮样式 */
        .btn-primary {
            background-color: #2563EB;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            background-color: #1D4ED8;
        }
        
        .btn-primary:disabled {
            background-color: #D1D5DB;
            cursor: not-allowed;
        }
        
        .btn-success {
            background-color: #10B981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .btn-success:hover {
            background-color: #059669;
        }
        
        .btn-danger {
            background-color: white;
            color: #EF4444;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #EF4444;
            cursor: pointer;
        }
        
        .btn-danger:hover {
            background-color: #FEF2F2;
        }
        
        .btn-outline {
            background-color: white;
            color: #2563EB;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #2563EB;
            cursor: pointer;
        }
        
        .btn-outline:hover {
            background-color: #EFF6FF;
        }
        
        /* 输入框样式 */
        .input-field {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            border: none;
            border-bottom: 1px solid #E5E7EB;
            font-size: 14px;
            background: white;
            transition: all 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-bottom-color: #2563EB;
        }
        
        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        
        /* 状态徽章 */
        .badge-pending {
            background-color: #FEF3C7;
            color: #92400E;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-success {
            background-color: #D1FAE5;
            color: #065F46;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-danger {
            background-color: #FEE2E2;
            color: #991B1B;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        /* ========================================
           动画效果
           ======================================== */
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .animate-slideUp {
            animation: slideUp 0.3s ease-out;
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.2s ease-out;
        }
        
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        /* ========================================
           滚动条样式
           ======================================== */
        
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #F9FAFB;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #9CA3AF;
        }
        
        /* ========================================
           响应式适配
           ======================================== */
        
        @media (max-width: 768px) {
            .pc-sidebar {
                transform: translateX(-100%);
            }
            
            .pc-header {
                left: 0;
            }
            
            .pc-main {
                margin-left: 0;
            }
        }
    </style>
</head>
<body x-data="app()" x-init="init()">
    
    <!-- ========================================
         平台选择器
         ======================================== -->
    <div class="fixed top-4 right-4 z-50" x-show="!isProduction">
        <!-- 平台选择按钮组 -->
        <div class="bg-white rounded-lg shadow-lg p-3 mb-2">
            <div class="text-xs font-medium text-gray-500 mb-2">平台</div>
            <div class="flex gap-1">
                <button @click="currentPlatform = 'miniprogram'" 
                        :class="currentPlatform === 'miniprogram' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'"
                        class="px-2 py-1 rounded text-xs font-medium transition-all">
                    小程序
                </button>
                <button @click="currentPlatform = 'work'" 
                        :class="currentPlatform === 'work' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'"
                        class="px-2 py-1 rounded text-xs font-medium transition-all">
                    企微
                </button>
                <button @click="currentPlatform = 'pc'" 
                        :class="currentPlatform === 'pc' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'"
                        class="px-2 py-1 rounded text-xs font-medium transition-all">
                    PC
                </button>
            </div>
        </div>
        
        <!-- 小程序场景切换器 -->
        <template x-if="currentPlatform === 'miniprogram'">
            <div class="bg-white rounded-lg shadow-lg p-3 max-w-[200px]">
                <div class="text-xs font-medium text-gray-500 mb-2">场景</div>
                <div class="grid grid-cols-2 gap-1">
                    <button @click="switchScenario('register')" 
                            :class="currentPage === 'register' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'"
                            class="px-2 py-1 rounded text-xs font-medium transition-all text-center">
                        登记页
                    </button>
                    <button @click="switchScenario('qrcode-pending')" 
                            :class="currentPage === 'qrcode' && qrCodeStatus === 'pending' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'"
                            class="px-2 py-1 rounded text-xs font-medium transition-all text-center">
                        待审核
                    </button>
                    <button @click="switchScenario('qrcode-approved')" 
                            :class="currentPage === 'qrcode' && qrCodeStatus === 'approved' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'"
                            class="px-2 py-1 rounded text-xs font-medium transition-all text-center">
                        已通过
                    </button>
                    <button @click="switchScenario('qrcode-rejected')" 
                            :class="currentPage === 'qrcode' && qrCodeStatus === 'rejected' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'"
                            class="px-2 py-1 rounded text-xs font-medium transition-all text-center">
                        已拒绝
                    </button>
                    <button @click="switchScenario('qrcode-expired')" 
                            :class="currentPage === 'qrcode' && qrCodeStatus === 'expired' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'"
                            class="px-2 py-1 rounded text-xs font-medium transition-all text-center">
                        已过期
                    </button>
                    <button @click="switchScenario('owner-review')" 
                            :class="currentPage === 'owner-review' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'"
                            class="px-2 py-1 rounded text-xs font-medium transition-all text-center">
                        业主审核
                    </button>
                    <button @click="switchScenario('qrcode-disabled')" 
                            :class="currentPage === 'qrcode' && qrCodeStatus === 'disabled' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'"
                            class="px-2 py-1 rounded text-xs font-medium transition-all text-center">
                        已禁用
                    </button>
                </div>
            </div>
        </template>
    </div>
    
    <!-- ========================================
         小程序端页面
         ======================================== -->
    
    <template x-if="currentPlatform === 'miniprogram'">
        <div class="miniprogram-container">
            
            <!-- 小程序导航栏 -->
            <div class="miniprogram-header">
                <button x-show="currentPage !== 'landing'" @click="goBack()" class="absolute left-4">
                    <i class="fas fa-arrow-left text-gray-600"></i>
                </button>
                <span class="text-base font-medium" x-text="getPageTitle()"></span>
            </div>
            
            <!-- 小程序内容区 -->
            <div class="miniprogram-content">
                
                <!-- ========================================
                     扫码落地页 - 访客类型选择
                     ======================================== -->
                <template x-if="currentPage === 'landing'">
                    <div class="relative h-full">
                        <!-- 背景遮罩 -->
                        <div class="absolute inset-0 bg-black bg-opacity-50" 
                             x-show="showVisitorTypeModal"
                             @click="showVisitorTypeModal = false"
                             x-transition:enter="transition ease-out duration-300"
                             x-transition:enter-start="opacity-0"
                             x-transition:enter-end="opacity-100"
                             x-transition:leave="transition ease-in duration-200"
                             x-transition:leave-start="opacity-100"
                             x-transition:leave-end="opacity-0">
                        </div>
                        
                        <!-- 访客类型选择弹窗 -->
                        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-xl animate-slideUp"
                             x-show="showVisitorTypeModal"
                             x-transition:enter="transition ease-out duration-300"
                             x-transition:enter-start="transform translate-y-full"
                             x-transition:enter-end="transform translate-y-0"
                             x-transition:leave="transition ease-in duration-200"
                             x-transition:leave-start="transform translate-y-0"
                             x-transition:leave-end="transform translate-y-full">
                            
                            <div class="p-6">
                                <div class="flex justify-between items-center mb-6">
                                    <h3 class="text-lg font-semibold">请选择访客类型</h3>
                                    <button @click="showVisitorTypeModal = false" class="text-gray-400 hover:text-gray-600">
                                        <i class="fas fa-times text-xl"></i>
                                    </button>
                                </div>
                                
                                <div class="grid grid-cols-3 gap-4">
                                    <!-- 探亲访友 -->
                                    <div @click="confirmVisitorType('探亲访友')" 
                                         class="flex flex-col items-center p-4 border-2 rounded-lg cursor-pointer transition-all hover:border-blue-500 hover:bg-blue-50 active:scale-95"
                                         :class="selectedVisitorType === '探亲访友' ? 'border-blue-500 bg-blue-50' : 'border-gray-200'">
                                        <i class="fas fa-home text-4xl text-blue-600 mb-2"></i>
                                        <span class="text-sm text-center">探亲访友</span>
                                    </div>
                                    
                                    <!-- 家政维修 -->
                                    <div @click="confirmVisitorType('家政维修')" 
                                         class="flex flex-col items-center p-4 border-2 rounded-lg cursor-pointer transition-all hover:border-blue-500 hover:bg-blue-50 active:scale-95"
                                         :class="selectedVisitorType === '家政维修' ? 'border-blue-500 bg-blue-50' : 'border-gray-200'">
                                        <i class="fas fa-tools text-4xl text-green-600 mb-2"></i>
                                        <span class="text-sm text-center">家政维修</span>
                                    </div>
                                    
                                    <!-- 房屋中介 -->
                                    <div @click="confirmVisitorType('房屋中介')" 
                                         class="flex flex-col items-center p-4 border-2 rounded-lg cursor-pointer transition-all hover:border-blue-500 hover:bg-blue-50 active:scale-95"
                                         :class="selectedVisitorType === '房屋中介' ? 'border-blue-500 bg-blue-50' : 'border-gray-200'">
                                        <i class="fas fa-building text-4xl text-purple-600 mb-2"></i>
                                        <span class="text-sm text-center">房屋中介</span>
                                    </div>
                                    
                                    <!-- 外卖 -->
                                    <div @click="confirmVisitorType('外卖')" 
                                         class="flex flex-col items-center p-4 border-2 rounded-lg cursor-pointer transition-all hover:border-blue-500 hover:bg-blue-50 active:scale-95"
                                         :class="selectedVisitorType === '外卖' ? 'border-blue-500 bg-blue-50' : 'border-gray-200'">
                                        <i class="fas fa-utensils text-4xl text-orange-600 mb-2"></i>
                                        <span class="text-sm text-center">外卖</span>
                                    </div>
                                    
                                    <!-- 快递 -->
                                    <div @click="confirmVisitorType('快递')" 
                                         class="flex flex-col items-center p-4 border-2 rounded-lg cursor-pointer transition-all hover:border-blue-500 hover:bg-blue-50 active:scale-95"
                                         :class="selectedVisitorType === '快递' ? 'border-blue-500 bg-blue-50' : 'border-gray-200'">
                                        <i class="fas fa-box text-4xl text-red-600 mb-2"></i>
                                        <span class="text-sm text-center">快递</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
                
                <!-- ========================================
                     查看二维码弹窗
                     ======================================== -->
                <div x-show="showQRCodeModal" 
                     class="fixed inset-0 z-50 flex items-center justify-center"
                     x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0"
                     x-transition:enter-end="opacity-100"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100"
                     x-transition:leave-end="opacity-0">
                    <!-- 背景遮罩 -->
                    <div class="absolute inset-0 bg-black bg-opacity-50" @click="showQRCodeModal = false"></div>
                    
                    <!-- 弹窗内容 -->
                    <div class="relative bg-white rounded-lg p-6 shadow-xl max-w-md w-full mx-4">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-semibold" x-text="'项目二维码 - ' + (selectedProject ? selectedProject.name : '')"></h3>
                            <button @click="showQRCodeModal = false" class="text-gray-400 hover:text-gray-600">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                        </div>
                        
                        <!-- 二维码显示 -->
                        <div class="flex justify-center mb-6">
                            <div class="w-[250px] h-[250px] bg-white border-2 border-gray-200 rounded-lg overflow-hidden p-4">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=PROJECT_QRCODE_DEMO&color=000000&bgcolor=FFFFFF" 
                                     alt="项目二维码" 
                                     class="w-full h-full">
                            </div>
                        </div>
                        
                        <!-- 提示信息 -->
                        <div class="text-center text-sm text-gray-500 mb-6">
                            <p>扫描此二维码可进入访客登记页面</p>
                            <p class="mt-1">有效期：长期有效</p>
                        </div>
                        
                        <!-- 操作按钮 -->
                        <div class="flex gap-3">
                            <button @click="downloadQRCodeImage()" class="flex-1 btn-primary">
                                <i class="fas fa-download mr-2"></i>下载二维码
                            </button>
                            <button @click="showQRCodeModal = false" class="flex-1 btn-outline">
                                关闭
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- ========================================
                     访客登记页
                     ======================================== -->
                <template x-if="currentPage === 'register'">
                    <div class="p-4">
                        <!-- 拜访信息 -->
                        <div class="mb-6">
                            <h3 class="text-sm text-gray-500 mb-3 px-2">拜访信息</h3>
                            <div class="bg-white rounded-lg overflow-hidden">
                                <!-- 访客类型 -->
                                <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 cursor-pointer hover:bg-gray-50 active:bg-gray-100"
                                     @click="showVisitorTypeModal = true">
                                    <label class="text-sm text-gray-700">
                                        <span class="text-red-500">*</span> 访客类型
                                    </label>
                                    <div class="flex items-center text-sm text-gray-900">
                                        <span x-text="formData.visitorType"></span>
                                        <i class="fas fa-chevron-down ml-2 text-gray-400"></i>
                                    </div>
                                </div>
                                
                                <!-- 房号选择 (仅探亲访友/家政维修/房屋中介显示) -->
                                <template x-if="['探亲访友', '家政维修', '房屋中介'].includes(formData.visitorType)">
                                    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 cursor-pointer hover:bg-gray-50 active:bg-gray-100"
                                         @click="showRoomPicker = true">
                                        <label class="text-sm text-gray-700">
                                            <span class="text-red-500">*</span> 房号
                                        </label>
                                        <div class="flex items-center text-sm text-gray-900">
                                            <span x-text="formData.roomNumber || '请选择房号'"></span>
                                            <i class="fas fa-chevron-down ml-2 text-gray-400"></i>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                        
                        <!-- 个人信息 -->
                        <div class="mb-6">
                            <h3 class="text-sm text-gray-500 mb-3 px-2">个人信息</h3>
                            <div class="bg-white rounded-lg overflow-hidden">
                                <!-- 姓名 -->
                                <div class="px-4 py-3 border-b border-gray-100">
                                    <label class="text-sm text-gray-700 block mb-2">
                                        <span class="text-red-500">*</span> 姓名
                                    </label>
                                    <input type="text" 
                                           x-model="formData.visitorName" 
                                           placeholder="请输入姓名"
                                           class="input-field border-none px-0">
                                </div>
                                
                                <!-- 手机号 (登录时已获取) -->
                                <div class="px-4 py-3">
                                    <label class="text-sm text-gray-700 block mb-2">手机号</label>
                                    <div class="text-sm text-gray-900" x-text="formData.visitorPhone"></div>
                                    <div class="text-xs text-gray-400 mt-1">登录时已自动获取</div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 提交按钮 -->
                        <button @click="submitRegistration()" 
                                class="w-full btn-primary"
                                :disabled="!isFormValid()">
                            <span x-show="!isSubmitting">生成通行码</span>
                            <span x-show="isSubmitting" class="flex items-center justify-center">
                                <i class="fas fa-spinner fa-spin mr-2"></i>
                                提交中...
                            </span>
                        </button>
                    </div>
                </template>
                
                <!-- ========================================
                     通行码页面
                     ======================================== -->
                <template x-if="currentPage === 'qrcode'">
                    <div class="p-4">
                        <!-- 状态提示 -->
                        <div class="text-center mb-6">
                            <div class="inline-flex items-center px-4 py-2 rounded-full"
                                 :class="{
                                     'bg-yellow-100 text-yellow-800': qrCodeStatus === 'pending',
                                     'bg-green-100 text-green-800': qrCodeStatus === 'approved',
                                     'bg-red-100 text-red-800': qrCodeStatus === 'rejected',
                                     'bg-gray-100 text-gray-800': qrCodeStatus === 'expired',
                                     'bg-gray-100 text-gray-600': qrCodeStatus === 'disabled'
                                 }">
                                <i class="fas mr-2"
                                   :class="{
                                       'fa-clock': qrCodeStatus === 'pending',
                                       'fa-check-circle': qrCodeStatus === 'approved',
                                       'fa-times-circle': qrCodeStatus === 'rejected',
                                       'fa-hourglass-end': qrCodeStatus === 'expired',
                                       'fa-ban': qrCodeStatus === 'disabled'
                                   }"></i>
                                <span x-text="qrCodeStatusText"></span>
                            </div>
                        </div>
                        
                        <!-- 二维码区域 -->
                        <div class="bg-white rounded-lg p-6 shadow-sm mb-6">
                            <div class="flex justify-center mb-4">

                    this.$nextTick(() => {
                        if (this.currentPlatform === 'pc' && this.currentPage === 'statistics') {
                            this.initCharts();

                    });
                    
                    // 监听页面变化
                    this.$watch('currentPage', (value) => {

                            this.$nextTick(() => {
                                this.initCharts();
                            });
                        }
                    });
                    
                    // 监听平台变化
                    this.$watch('currentPlatform', (value) => {
                        if (value === 'miniprogram') {
                            this.currentPage = 'landing';

                        } else if (value === 'pc') {

                updateCurrentTime() {
                    const now = new Date();
                    const year = now.getFullYear();
                    const month = String(now.getMonth() + 1).padStart(2, '0');
                    const day = String(now.getDate()).padStart(2, '0');
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const seconds = String(now.getSeconds()).padStart(2, '0');
                    this.currentTime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
                },
                
                getPageTitle() {
                    const titles = {
                        // 小程序端
                        'landing': '到访信息快速登记',
                        'register': '到访信息快速登记',
                        'qrcode': '通行二维码',

                        // PC管理端
                        'qrcode-manage': '项目二维码管理',
                        'statistics': '访客统计'
                    };
                    return titles[this.currentPage] || '';
                },
                
                goBack() {
                    const platformPages = {
                        miniprogram: {
                            'register': 'landing',
                            'qrcode': 'register',
                            'owner-review': 'landing'
                        },
                        work: {
                            'record-detail': 'record-list'
                        },
                        pc: {}
                    };
                    
                    const previousPage = platformPages[this.currentPlatform]?.[this.currentPage];
                    if (previousPage) {
                        this.currentPage = previousPage;
                    }
                },
                
                showToastMessage(message, type = 'success') {
                    this.toastMessage = message;
                    this.toastType = type;
                    this.showToast = true;
                    setTimeout(() => {
                        this.showToast = false;
                    }, 3000);
                },
                
                showConfirm(title, message, callback) {
                    this.confirmDialogTitle = title;
                    this.confirmDialogMessage = message;
                    this.confirmCallback = callback;
                    this.showConfirmDialog = true;
                },
                
                confirmAction() {
                    if (this.confirmCallback) {
                        this.confirmCallback();
                    }
                    this.showConfirmDialog = false;

                // 小程序端方法
                // ========================================
                
                selectVisitorType(type) {
                    this.selectedVisitorType = type;
                },
                
                confirmVisitorType(type) {
                    if (type) {
                        this.selectedVisitorType = type;
                    }
                    
                    if (!this.selectedVisitorType) {
                        this.showToastMessage('请选择访客类型', 'warning');
                        return;
                    }
                    
                    this.formData.visitorType = this.selectedVisitorType;
                    this.showVisitorTypeModal = false;
                    this.currentPage = 'register';

                    this.formData.visitorType = type;
                    this.showVisitorTypeModal = false;

                    if (['外卖', '快递'].includes(type)) {
                        this.formData.roomNumber = '';
                        this.selectedRoom = { group: '', building: '', unit: '', room: '' };
                    }
                },
                
                // 房号级联选择器方法
                selectGroup(group) {
                    this.selectedRoom.group = group;
                    this.selectedRoom.building = '';
                    this.selectedRoom.unit = '';
                    this.selectedRoom.room = '';
                },
                
                selectBuilding(building) {
                    this.selectedRoom.building = building;
                    this.selectedRoom.unit = '';
                    this.selectedRoom.room = '';
                },
                
                selectUnit(unit) {
                    this.selectedRoom.unit = unit;
                    this.selectedRoom.room = '';
                },
                
                selectRoom(room) {
                    this.selectedRoom.room = room;
                },
                
                confirmRoomSelection() {
                    if (!this.selectedRoom.room) {
                        this.showToastMessage('请选择完整房号', 'warning');
                        return;
                    }
                    
                    const { group, building, unit, room } = this.selectedRoom;
                    this.formData.roomNumber = `${group} ${building} ${unit} ${room}`;
                    this.showRoomPicker = false;
                },
                
                // 场景切换方法
                switchScenario(scenario) {
                    switch(scenario) {
                        case 'register':
                            this.currentPage = 'register';
                            break;
                        case 'qrcode-pending':
                            this.qrCodeStatus = 'pending';
                            this.currentPage = 'qrcode';
                            break;
                        case 'qrcode-approved':
                            this.qrCodeStatus = 'approved';
                            this.currentPage = 'qrcode';
                            break;
                        case 'qrcode-rejected':
                            this.qrCodeStatus = 'rejected';
                            this.currentPage = 'qrcode';
                            break;
                        case 'qrcode-expired':
                            this.qrCodeStatus = 'expired';
                            this.currentPage = 'qrcode';
                            break;
                        case 'qrcode-disabled':
                            this.qrCodeStatus = 'disabled';
                            this.currentPage = 'qrcode';
                            break;
                        case 'owner-review':
                            this.currentPage = 'owner-review';
                            break;
                    }
                },
                
                getPhoneNumber() {
                    // 模拟一键登录
                    this.showToastMessage('获取手机号成功', 'success');
                },
                
                isFormValid() {
                    if (!this.formData.visitorType || !this.formData.visitorName) {
                        return false;
                    }
                    
                    if (['探亲访友', '家政维修', '房屋中介'].includes(this.formData.visitorType)) {
                        if (!this.formData.roomNumber) {
                            return false;
                        }
                    }
                    
                    return true;
                },
                
                submitRegistration() {
                    if (!this.isFormValid()) {
                        this.showToastMessage('请填写完整信息', 'warning');
                        return;
                    }
                    
                    this.isSubmitting = true;
                    
                    // 模拟提交
                    setTimeout(() => {
                        this.isSubmitting = false;
                        this.currentPage = 'qrcode';
                        this.generateQRCode();
                        this.showToastMessage('登记成功', 'success');
                    }, 1500);
                },
                
                generateQRCode() {
                    this.$nextTick(() => {
                        const canvas = document.getElementById('qrcode-canvas');
                        if (canvas && typeof QRCode !== 'undefined') {
                            QRCode.toCanvas(canvas, 'VISITOR-' + Date.now(), {
                                width: 200,
                                margin: 2,
                                color: {
                                    dark: this.qrCodeStatus === 'rejected' ? '#9CA3AF' : '#000000',
                                    light: '#FFFFFF'
                                }
                            }, function(error) {
                                if (error) console.error(error);
                            });
                        }
                    });
                },
                
                editInfo() {
                    this.currentPage = 'register';
                },
                
                reapplyQRCode() {
                    this.qrCodeStatus = 'pending';
                    this.showToastMessage('已重新申请通行码', 'success');
                },
                
                approveVisitor() {
                    this.showConfirm(
                        '确认通过',
                        '是否同意访客通行?',
                        () => {
                            this.showToastMessage('审核成功', 'success');
                            this.currentPage = 'landing';
                        }
                    );
                },
                
                rejectVisitor() {
                    this.showConfirm(
                        '确认拒绝',
                        '是否拒绝访客通行?',
                        () => {
                            this.showToastMessage('审核成功', 'success');
                            this.currentPage = 'landing';
                        }
                    );
                },
                
                // ========================================
                // 企微端方法
                // ========================================
                
                get filteredRecords() {
                    if (this.filterStatus === 'all') {
                        return this.records;
                    }
                    return this.records.filter(record => record.status === this.filterStatus);
                },
                
                viewRecordDetail(record) {
                    this.currentRecord = record;
                    this.currentPage = 'record-detail';
                },
                
                approveRecord(record) {
                    this.showConfirm(
                        '确认通过',
                        '是否同意访客通行?',
                        () => {
                            record.status = 'approved';
                            record.statusText = '已放行';
                            record.reviewerName = '张三';
                            record.reviewTime = new Date().toLocaleString('zh-CN', {
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit',
                                hour: '2-digit',
                                minute: '2-digit',
                                second: '2-digit'
                            }).replace(/\//g, '-');
                            this.showToastMessage('审核成功', 'success');
                            if (this.currentPage === 'record-detail') {
                                this.currentPage = 'record-list';
                            }
                        }
                    );
                },
                
                rejectRecord(record) {
                    this.showConfirm(
                        '确认拒绝',
                        '是否拒绝访客通行?',
                        () => {
                            record.status = 'rejected';
                            record.statusText = '已拒绝';
                            record.reviewerName = '张三';
                            record.reviewTime = new Date().toLocaleString('zh-CN', {
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit',
                                hour: '2-digit',
                                minute: '2-digit',
                                second: '2-digit'
                            }).replace(/\//g, '-');
                            record.reviewRemark = '信息不实';
                            this.showToastMessage('审核成功', 'success');
                            if (this.currentPage === 'record-detail') {
                                this.currentPage = 'record-list';
                            }
                        }
                    );
                },
                
                forwardToOwner() {
                    this.showConfirm(
                        '转发业主审核',
                        '确认将此访客申请转发给业主审核?',
                        () => {
                            this.showToastMessage('已转发业主审核', 'success');
                            this.currentPage = 'record-list';
                        }
                    );
                },
                
                // ========================================
                // PC管理端方法
                // ========================================
                
                viewQRCode(project) {
                    this.selectedProject = project;
                    this.showQRCodeModal = true;
                },
                
                downloadQRCodeImage() {
                    const link = document.createElement('a');
                    link.href = 'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=PROJECT_QRCODE_DEMO&color=000000&bgcolor=FFFFFF';
                    link.download = `项目二维码_${this.selectedProject ? this.selectedProject.name : 'demo'}.png`;
                    link.click();
                    this.showToastMessage('二维码下载成功', 'success');
                },
                
                downloadQRCode(project) {
                    this.selectedProject = project;
                    this.downloadQRCodeImage();
                },
                
                toggleProjectStatus(project) {
                    const action = project.status === 'enabled' ? '禁用' : '启用';
                    this.showConfirm(
                        `确认${action}`,
                        `是否${action}项目 ${project.name}?`,
                        () => {
                            project.status = project.status === 'enabled' ? 'disabled' : 'enabled';
                            this.showToastMessage(`${action}成功`, 'success');
                        }
                    );
                },
                
                initCharts() {
                    this.$nextTick(() => {
                        setTimeout(() => {
                            if (typeof Chart === 'undefined') {
                                console.error('Chart.js is not loaded');
                                return;
                            }
                            
                            const typeCanvas = document.getElementById('visitor-type-chart');
                            const trendCanvas = document.getElementById('visitor-trend-chart');
                            
                            if (!typeCanvas || !trendCanvas) {
                                console.error('Chart canvas not found');
                                return;
                            }
                            
                            const typeCtx = typeCanvas.getContext('2d');
                            const trendCtx = trendCanvas.getContext('2d');
                            
                            new Chart(typeCtx, {
                                type: 'doughnut',
                                data: {
                                    labels: ['探亲访友', '家政维修', '房屋中介', '外卖', '快递'],
                                    datasets: [{
                                        data: [35, 20, 15, 18, 12],
                                        backgroundColor: [
                                            '#2563EB',
                                            '#10B981',
                                            '#8B5CF6',
                                            '#F59E0B',
                                            '#EF4444'
                                        ]
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: {
                                            position: 'bottom'
                                        }
                                    }
                                }
                            });
                            
                            new Chart(trendCtx, {
                                type: 'line',
                                data: {
                                    labels: ['03-20', '03-21', '03-22', '03-23', '03-24', '03-25', '03-26'],
                                    datasets: [{
                                        label: '访客数量',
                                        data: [120, 150, 180, 160, 200, 220, 234],
                                        borderColor: '#2563EB',
                                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                                        tension: 0.4,
                                        fill: true
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: {
                                            display: false
                                        }
                                    },
                                    scales: {
                                        y: {
                                            beginAtZero: true
                                        }
                                    }
                                }
                            });
                        }, 100);
                    });
                }
            }
        }
    </script>
    
</body>
</html>
